<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mám pro tebe otázku... 💕</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { overflow: hidden; height: 100%; width: 100%; }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4, #ffafbd, #ffc3a0);
    background-size: 400% 400%;
    animation: gradient 12s ease infinite;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  @keyframes gradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .container {
    text-align: center;
    padding: 2rem;
    z-index: 10;
    max-width: 600px;
    width: 100%;
  }
  h1 {
    font-size: clamp(1.8rem, 5vw, 3rem);
    color: white;
    text-shadow: 2px 2px 12px rgba(0,0,0,0.25);
    margin-bottom: 3rem;
    animation: bounce 2.5s ease infinite;
    line-height: 1.3;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }
  .buttons {
    display: flex;
    gap: 2rem;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    position: relative;
    min-height: 120px;
  }
  button {
    padding: 1rem 2.5rem;
    font-size: 1.5rem;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    font-weight: bold;
    font-family: inherit;
    transition: transform 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
  }
  #yesBtn {
    background: #ff4081;
    color: white;
    box-shadow: 0 5px 25px rgba(255, 64, 129, 0.5);
    transform-origin: center;
  }
  #yesBtn:hover {
    background: #f50057;
    box-shadow: 0 8px 35px rgba(245, 0, 87, 0.6);
  }
  #noBtn {
    background: white;
    color: #ff4081;
    transition: left 0.15s ease, top 0.15s ease, transform 0.15s ease;
    font-size: 1.5rem;
    white-space: nowrap;
    min-width: 100px;
  }
  .hearts {
    position: fixed;
    pointer-events: none;
    font-size: 2.5rem;
    animation: floatUp 3.5s ease-in forwards;
    z-index: 5;
  }
  @keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg) scale(0.5); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translateY(-110vh) rotate(720deg) scale(1.5); opacity: 0; }
  }
  #screen2, #screen3, #screen4 { display: none; }
  textarea {
    width: 100%;
    padding: 1.2rem;
    font-size: 1.2rem;
    border-radius: 20px;
    border: 4px solid white;
    margin: 1rem 0;
    font-family: inherit;
    min-height: 130px;
    resize: none;
    outline: none;
    box-shadow: 0 5px 20px rgba(0,0,0,0.15);
  }
  textarea:focus { border-color: #ff4081; }
  .submit-btn {
    background: #ff4081;
    color: white;
    margin-top: 1rem;
    box-shadow: 0 5px 25px rgba(255, 64, 129, 0.5);
  }
  .submit-btn:hover { background: #f50057; transform: scale(1.05); }
  .submit-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
  .response {
    background: white;
    padding: 2rem;
    border-radius: 25px;
    color: #333;
    font-size: 1.4rem;
    margin-top: 1.5rem;
    font-style: italic;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .hint {
    color: white;
    margin-top: 2rem;
    font-size: 1.1rem;
    text-shadow: 1px 1px 5px rgba(0,0,0,0.3);
  }
  .shake { animation: shake 0.5s ease; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-10px); }
    75% { transform: translateX(10px); }
  }
  .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 3px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    border-top-color: white;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="container" id="screen1">
    <h1>Půjdeš semnou na rande lásko? 💕</h1>
    <div class="buttons">
      <button id="yesBtn" onclick="sayYes()">Ano 🥰</button>
      <button id="noBtn">Ne</button>
    </div>
  </div>

  <div class="container" id="screen2">
    <h1>A jaké rande chceš? 😏</h1>
    <textarea id="answerText" placeholder="Napiš co bys chtěla, lásko... 💭"></textarea>
    <button class="submit-btn" id="submitBtn" onclick="submitAnswer()">Odeslat 💌</button>
  </div>

  <div class="container" id="screen3">
    <h1>Tak to bude paráda! 🥰💕</h1>
    <p style="color:white; font-size:1.2rem; text-shadow:1px 1px 5px rgba(0,0,0,0.3);">Tvoje odpověď dorazila ✨</p>
    <div class="response" id="finalResponse"></div>
    <p class="hint">Už se nemůžu dočkat! 💕</p>
  </div>

  <div class="container" id="screen4">
    <h1>Hmm, něco se pokazilo 😅</h1>
    <p style="color:white; font-size:1.2rem;">Pošli mi to radši screenshotem 📸</p>
    <div class="response" id="fallbackResponse"></div>
  </div>

<script>
// ============================================
//   👇 TVŮJ EMAIL SI VYM ĚŇ TADY 👇
// ============================================
const MY_EMAIL = 'kyssi10@seznam.cz';
// ============================================

const messages = [
  "Ne", "Určitě? 🤔", "Hmm... 😟", "Ale no tak...",
  "Pořádně si to rozmysli", "To myslíš vážně? 😢",
  "Prosíím 🥺", "Já brečím 😭", "Naposled to nabízím",
  "Zlomíš mi srdce 💔", "Tak fakt ne?", "🥺🥺🥺",
  "Klikni na ANO", "Tak naposled...", "Jsi krutá 😩",
  "Miluju tě 💔",  "Já se urazím 😤", "Ale fakt naposled", "...nebo ne, ještě zkus 🥺", "🫠", "Vážně? 🥲", "PROSÍM", "Ne to není odpověď"
];

let msgIndex = 0;
let yesScale = 1;

const noBtn = document.getElementById('noBtn');
const yesBtn = document.getElementById('yesBtn');

function dodge() {
  const margin = 30;
  const btnW = noBtn.offsetWidth;
  const btnH = noBtn.offsetHeight;
  const maxX = window.innerWidth - btnW - margin;
  const maxY = window.innerHeight - btnH - margin;
  const x = margin + Math.random() * (maxX - margin);
  const y = margin + Math.random() * (maxY - margin);
  noBtn.style.position = 'fixed';
  noBtn.style.left = x + 'px';
  noBtn.style.top = y + 'px';
  noBtn.style.transform = `rotate(${(Math.random() - 0.5) * 40}deg)`;

  msgIndex = (msgIndex + 1) % messages.length;
  noBtn.textContent = messages[msgIndex];

  if (yesScale < 2.5) {
    yesScale += 0.08;
    yesBtn.style.transform = `scale(${yesScale})`;
  }
}

noBtn.addEventListener('mouseover', dodge);
noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); dodge(); }, { passive: false });

document.addEventListener('mousemove', (e) => {
  const rect = noBtn.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const dist = Math.hypot(e.clientX - cx, e.clientY - cy);
  if (dist < 100) dodge();
});

noBtn.addEventListener('click', (e) => {
  e.preventDefault();
  document.getElementById('screen1').classList.add('shake');
  setTimeout(() => document.getElementById('screen1').classList.remove('shake'), 500);
  alert('To bych moc nedoporučoval... zkus to znovu 😤💔');
});

function spawnHearts(count, duration = 3000) {
  const emojis = ['💕','💖','💗','💝','❤️','🌹','💐','😍','🥰'];
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const heart = document.createElement('div');
      heart.className = 'hearts';
      heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.bottom = '-50px';
      heart.style.fontSize = (1.5 + Math.random() * 2) + 'rem';
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 3500);
    }, i * (duration / count));
  }
}

function sayYes() {
  spawnHearts(40, 1500);
  setTimeout(() => {
    document.getElementById('screen1').style.display = 'none';
    document.getElementById('screen2').style.display = 'block';
  }, 1200);
}

async function submitAnswer() {
  const answer = document.getElementById('answerText').value.trim();
  if (!answer) {
    alert('No tak něco napiš, ať vím! 😊');
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Posílám...';

  try {
    const response = await fetch(`https://formsubmit.co/ajax/${MY_EMAIL}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      body: JSON.stringify({
        _subject: '💕 Lásko odpověděla na rande!',
        _template: 'box',
        _captcha: 'false',
        'Odpověď': answer,
        'Datum': new Date().toLocaleString('cs-CZ')
      })
    });

    const data = await response.json();

    if (data.success === 'true' || data.success === true) {
      document.getElementById('finalResponse').textContent = '„' + answer + '"';
      document.getElementById('screen2').style.display = 'none';
      document.getElementById('screen3').style.display = 'block';
      spawnHearts(60, 2500);
    } else {
      throw new Error('Send failed');
    }
  } catch (err) {
    console.error(err);
    document.getElementById('fallbackResponse').textContent = '„' + answer + '"';
    document.getElementById('screen2').style.display = 'none';
    document.getElementById('screen4').style.display = 'block';
    spawnHearts(30, 2000);
  }
}
</script>
</body>
</html>
